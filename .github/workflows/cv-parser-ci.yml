name: cv-parser CI

on:
  push:
    branches: [main]
    paths:
      - "services/cv-parser/**"
      - ".github/workflows/cv-parser-ci.yml"
  pull_request:
    paths:
      - "services/cv-parser/**"
      - ".github/workflows/cv-parser-ci.yml"

defaults:
  run:
    working-directory: services/cv-parser

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/cv-parser/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          python -m spacy download en_core_web_sm

      - name: Lint (ruff)
        run: python -m ruff check app/

      - name: Type-check (mypy)
        run: python -m mypy app/

      - name: Test (pytest)
        env:
          CV_PARSER_ENABLE_TRANSFORMER: "0"
        run: python -m pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        # `defaults.run.working-directory` above already puts this step in
        # services/cv-parser, so the build context is "." — not
        # "services/cv-parser" again (that path-doubling is exactly what
        # broke this job the first time it was actually run).
        run: docker build -t cv-parser:ci .
