name: proctoring CI

on:
  push:
    branches: [main]
    paths:
      - "services/proctoring/**"
      - ".github/workflows/proctoring-ci.yml"
  pull_request:
    paths:
      - "services/proctoring/**"
      - ".github/workflows/proctoring-ci.yml"

defaults:
  run:
    working-directory: services/proctoring

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/proctoring/requirements-dev.txt

      - name: Install system dependencies
        # OpenCV (pulled in by mediapipe) needs these even for headless use.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Download MediaPipe face landmarker model
        run: |
          mkdir -p models
          curl -fsSL -o models/face_landmarker.task \
            https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task

      - name: Lint (ruff)
        run: python -m ruff check app/ tests/

      - name: Type-check (mypy)
        run: python -m mypy app/

      - name: Test (pytest)
        env:
          PROCTORING_REDIS_URI: redis://localhost:6379
        run: python -m pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t proctoring:ci .
