name: interview-qa CI

on:
  push:
    branches: [main]
    paths:
      - "services/interview-qa/**"
      - ".github/workflows/interview-qa-ci.yml"
  pull_request:
    paths:
      - "services/interview-qa/**"
      - ".github/workflows/interview-qa-ci.yml"

defaults:
  run:
    working-directory: services/interview-qa

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/interview-qa/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: python -m ruff check app/ tests/

      - name: Type-check (mypy)
        run: python -m mypy app/

      - name: Test (pytest)
        # No INTERVIEW_QA_GROQ_API_KEY secret configured here deliberately —
        # test_live_groq.py skips cleanly without one. Set the
        # INTERVIEW_QA_GROQ_API_KEY repo secret and add it to `env:` below
        # to also exercise the real-API tests in CI.
        run: python -m pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t interview-qa:ci .
