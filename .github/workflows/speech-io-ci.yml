name: speech-io CI

on:
  push:
    branches: [main]
    paths:
      - "services/speech-io/**"
      - ".github/workflows/speech-io-ci.yml"
  pull_request:
    paths:
      - "services/speech-io/**"
      - ".github/workflows/speech-io-ci.yml"

defaults:
  run:
    working-directory: services/speech-io

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/speech-io/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: python -m ruff check app/ tests/

      - name: Type-check (mypy)
        run: python -m mypy app/

      - name: Test (pytest)
        # No SPEECH_IO_GROQ_API_KEY secret configured here deliberately —
        # the Groq-dependent tests in test_live_speech.py skip cleanly
        # without one. The edge-tts live tests still run (no credential
        # needed) since they hit a real, free, unauthenticated endpoint.
        run: python -m pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t speech-io:ci .
