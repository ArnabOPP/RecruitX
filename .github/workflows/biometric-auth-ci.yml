name: biometric-auth CI

on:
  push:
    branches: [main]
    paths:
      - "services/biometric-auth/**"
      - ".github/workflows/biometric-auth-ci.yml"
  pull_request:
    paths:
      - "services/biometric-auth/**"
      - ".github/workflows/biometric-auth-ci.yml"

defaults:
  run:
    working-directory: services/biometric-auth

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/biometric-auth/requirements-dev.txt

      - name: Install system dependencies
        # OpenCV (pulled in by mediapipe) needs these even for headless use.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Download MediaPipe face landmarker model
        run: |
          mkdir -p models
          curl -fsSL -o models/face_landmarker.task \
            https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task

      - name: Lint (ruff)
        run: python -m ruff check app/ tests/

      - name: Type-check (mypy)
        run: python -m mypy app/

      - name: Test (pytest)
        # No external API credentials needed anywhere in this suite — face
        # detection/recognition/liveness are 100% local compute (self-hosted
        # MediaPipe + ArcFace models), so every test always runs, including
        # the live-model ones.
        run: python -m pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t biometric-auth:ci .
