name: orchestrator CI

on:
  push:
    branches: [main]
    paths:
      - "services/orchestrator/**"
      - ".github/workflows/orchestrator-ci.yml"
  pull_request:
    paths:
      - "services/orchestrator/**"
      - ".github/workflows/orchestrator-ci.yml"

defaults:
  run:
    working-directory: services/orchestrator

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/orchestrator/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: python -m ruff check app/ tests/

      - name: Type-check (mypy)
        run: python -m mypy app/

      - name: Test (pytest)
        # test_session_store_live.py spins up its own throwaway Redis
        # container (Docker is available on this runner). test_live_e2e.py
        # needs all five other Recruitix services actually running, which
        # this job deliberately doesn't stand up — it skips cleanly by
        # design (see its own module docstring); it's meant to be run
        # deliberately with the full stack up, not as part of this
        # single-service CI job.
        run: python -m pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t orchestrator:ci .
