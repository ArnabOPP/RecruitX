name: code-eval CI

on:
  push:
    branches: [main]
    paths:
      - "services/code-eval/**"
      - ".github/workflows/code-eval-ci.yml"
  pull_request:
    paths:
      - "services/code-eval/**"
      - ".github/workflows/code-eval-ci.yml"

defaults:
  run:
    working-directory: services/code-eval

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/code-eval/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Pull sandbox language images
        run: docker pull python:3.11-slim && docker pull node:20-slim

      - name: Lint (ruff)
        run: python -m ruff check app/ tests/

      - name: Type-check (mypy)
        run: python -m mypy app/

      - name: Test (pytest)
        # No external credentials needed — the sandbox and Redis tests use
        # the runner's own Docker daemon directly (always available on
        # GitHub-hosted ubuntu-latest runners), so every test always runs.
        run: python -m pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t code-eval:ci .
