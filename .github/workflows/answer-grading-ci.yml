name: answer-grading CI

on:
  push:
    branches: [main]
    paths:
      - "services/answer-grading/**"
      - ".github/workflows/answer-grading-ci.yml"
  pull_request:
    paths:
      - "services/answer-grading/**"
      - ".github/workflows/answer-grading-ci.yml"

defaults:
  run:
    working-directory: services/answer-grading

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/answer-grading/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: python -m ruff check app/ tests/

      - name: Type-check (mypy)
        run: python -m mypy app/

      - name: Test (pytest)
        # No external credentials needed anywhere in this suite — scoring
        # is 100% local compute (Jaccard + a self-hosted embedding model),
        # so every test (including the "live model" ones) always runs.
        run: python -m pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t answer-grading:ci .
